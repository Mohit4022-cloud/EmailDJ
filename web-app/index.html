<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EmailDJ Web MVP</title>
    <style>
      :root {
        --bg-0: #fff9ee;
        --bg-1: #f6f0ff;
        --panel: rgba(255, 255, 255, 0.78);
        --text: #1a1d2e;
        --muted: #61657a;
        --accent: #ff7d3a;
        --accent-2: #0f766e;
        --line: #d8dbe8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        color: var(--text);
        background: radial-gradient(circle at top left, var(--bg-0), var(--bg-1));
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }
      .shell {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px 18px 36px;
      }
      .hero {
        margin-bottom: 18px;
      }
      .hero h1 {
        margin: 0;
        font-size: clamp(1.6rem, 2.4vw, 2.4rem);
      }
      .hero p {
        margin: 8px 0 0;
        color: var(--muted);
      }
      .layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
      }
      @media (min-width: 980px) {
        .layout {
          grid-template-columns: 1.08fr 0.92fr;
        }
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(24, 29, 58, 0.06);
        backdrop-filter: blur(4px);
        padding: 16px;
      }
      .field {
        display: flex;
        flex-direction: column;
        margin-bottom: 10px;
      }
      .field label {
        margin-bottom: 4px;
        font-size: 0.85rem;
        color: var(--muted);
      }
      .field input, .field textarea {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        font: inherit;
        background: white;
      }
      .field textarea {
        min-height: 180px;
        resize: vertical;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }
      @media (min-width: 640px) {
        .row { grid-template-columns: 1fr 1fr; }
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      button {
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn-primary {
        background: linear-gradient(90deg, var(--accent), #ff9e57);
        color: #0d111f;
      }
      .btn-secondary {
        background: #e7ebf9;
        color: #1a1d2e;
      }
      .status {
        min-height: 20px;
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.9rem;
      }
      .slider-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .slider {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        background: #fff;
      }
      .slider .labels {
        display: flex;
        justify-content: space-between;
        color: var(--muted);
        font-size: 0.8rem;
        margin-bottom: 6px;
      }
      .slider .title {
        font-weight: 600;
        margin-bottom: 6px;
      }
      .slider input[type="range"] {
        width: 100%;
      }
      .editor {
        margin-top: 10px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        min-height: 250px;
        padding: 12px;
        white-space: pre-wrap;
      }
      .editor[contenteditable="true"]:focus {
        outline: 2px solid #ffd8c0;
      }
      .meta {
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.82rem;
      }
      .pulse {
        animation: pulse 1.6s infinite;
      }
      @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.45; }
        100% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div class="shell" id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
