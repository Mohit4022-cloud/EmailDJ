name: Legacy Backend Eval Regression

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/eval_regression.yml'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  legacy-backend-eval-regression:
    name: Legacy backend eval regression
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      USE_PROVIDER_STUB: "0"
      APP_ENV: local
      LLM_DRAFTING: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install legacy backend deps
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r backend/requirements.txt

      - name: Run legacy emaildj eval harness
        id: eval
        run: |
          source .venv/bin/activate
          REPORT_PATH="backend/evals/reports/ci_emaildj.json"
          GOLDEN_PRESENT=0
          python -m backend.evals.eval_run --payloads emaildj --stages all --raw --report "$REPORT_PATH"

          if ls backend/evals/golden/*.json >/dev/null 2>&1; then
            GOLDEN_PRESENT=1
            REPORT_PATH="backend/evals/reports/ci_emaildj_golden.json"
            python -m backend.evals.eval_run --payloads emaildj --stages all --raw --golden --report "$REPORT_PATH"
          fi

          GATE_ARGS=()
          if [ "$GOLDEN_PRESENT" = "1" ]; then
            GATE_ARGS+=(--golden-present)
          fi
          python -m backend.evals.ci_gate "$REPORT_PATH" --summary backend/evals/reports/ci_summary.txt "${GATE_ARGS[@]}"

          echo "report_path=$REPORT_PATH" >> "$GITHUB_OUTPUT"

      - name: Append summary
        run: |
          cat backend/evals/reports/ci_summary.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on PR
        if: ${{ github.event_name == 'pull_request' }}
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('backend/evals/reports/ci_summary.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Legacy Backend Eval Regression\n\n\`\`\`\n${body}\n\`\`\``,
            });

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-regression-reports
          path: |
            backend/evals/reports/*.json
            backend/evals/reports/*.txt
