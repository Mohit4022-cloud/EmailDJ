name: Legacy Backend Eval Regression

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/eval_regression.yml'

jobs:
  legacy-backend-eval-regression:
    name: Legacy backend eval regression
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      USE_PROVIDER_STUB: "0"
      APP_ENV: local
      LLM_DRAFTING: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install legacy backend deps
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r backend/requirements.txt

      - name: Run legacy emaildj eval harness
        id: eval
        run: |
          source .venv/bin/activate
          REPORT_PATH="backend/evals/reports/ci_emaildj.json"
          python -m backend.evals.eval_run --payloads emaildj --stages all --raw --report "$REPORT_PATH"

          if ls backend/evals/golden/*.json >/dev/null 2>&1; then
            REPORT_PATH="backend/evals/reports/ci_emaildj_golden.json"
            python -m backend.evals.eval_run --payloads emaildj --stages all --raw --golden --report "$REPORT_PATH"
          fi

          python - "$REPORT_PATH" <<'PY'
          import json
          import sys
          from pathlib import Path

          report_path = Path(sys.argv[1])
          report = json.loads(report_path.read_text(encoding="utf-8"))

          hard_fail_payloads = [
              item.get("payload_id")
              for item in report.get("payload_results", [])
              if item.get("hard_fail_triggered")
          ]

          regressed = []
          regression = report.get("regression_vs_golden")
          if isinstance(regression, dict):
              regressed = list(regression.get("regressed") or [])

          c0_rate = float((report.get("stage_pass_rates") or {}).get("ONE_LINER_COMPRESSOR") or 0.0)

          summary_lines = [
              f"Report: {report_path}",
              f"Payload count: {report.get('payload_count', 0)}",
              f"Overall pass rate: {report.get('overall_pass_rate', 0.0):.2%}",
              f"ONE_LINER_COMPRESSOR pass rate: {c0_rate:.2%}",
              f"Hard-fail payloads: {', '.join(hard_fail_payloads) if hard_fail_payloads else 'none'}",
              f"Regressed payloads: {', '.join(regressed) if regressed else 'none'}",
          ]
          summary = "\n".join(summary_lines)
          print(summary)

          Path("backend/evals/reports/ci_summary.txt").write_text(summary, encoding="utf-8")

          failures = []
          if hard_fail_payloads:
              failures.append("hard_fail_triggered on emaildj payloads")
          if regressed:
              failures.append("regression_vs_golden detected")
          if c0_rate < 0.6:
              failures.append("ONE_LINER_COMPRESSOR pass rate below 0.6")

          if failures:
              print("\nBlocking conditions:\n- " + "\n- ".join(failures))
              sys.exit(1)
          PY

          echo "report_path=$REPORT_PATH" >> "$GITHUB_OUTPUT"

      - name: Append summary
        run: |
          cat backend/evals/reports/ci_summary.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('backend/evals/reports/ci_summary.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Legacy Backend Eval Regression\n\n\`\`\`\n${body}\n\`\`\``,
            });

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-regression-reports
          path: |
            backend/evals/reports/*.json
            backend/evals/reports/*.txt
