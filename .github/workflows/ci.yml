name: CI

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      allow_judge_drift_override:
        description: 'Allow nightly judge drift override when model/version changes'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 7 * * *'

permissions:
  contents: read
  actions: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend deps
        working-directory: hub-api
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Install extension deps
        working-directory: chrome-extension
        run: npm install

      - name: Run extension unit tests
        working-directory: chrome-extension
        run: npm test

      - name: Run checks
        working-directory: hub-api
        run: |
          source .venv/bin/activate
          ./scripts/checks.sh

      - name: Judge smoke + sentinel sanity (mock)
        working-directory: hub-api
        run: |
          source .venv/bin/activate
          ./scripts/eval:judge:smoke --report-dir reports/judge/ci_candidate
          ./scripts/eval:judge:sanity

      - name: Pairwise regression gate on prompt-contract diffs
        if: ${{ github.event_name == 'pull_request' }}
        working-directory: hub-api
        run: |
          set -euo pipefail
          source .venv/bin/activate

          BASE_REF="${{ github.base_ref }}"
          git fetch origin "${BASE_REF}" --depth=1
          CHANGED="$(git diff --name-only "origin/${BASE_REF}"...HEAD)"
          echo "Changed files:"
          echo "${CHANGED}"

          if ! echo "${CHANGED}" | grep -Eq "^hub-api/evals/judge/(prompts|rubric)\\.py$"; then
            echo "No prompt-contract file changes; skipping pairwise regression gate."
            exit 0
          fi

          BASE_WORKTREE="$(mktemp -d)"
          git worktree add --detach "${BASE_WORKTREE}" "origin/${BASE_REF}"
          cleanup() {
            git worktree remove --force "${BASE_WORKTREE}" || true
          }
          trap cleanup EXIT

          PYTHON_BIN="$(pwd)/.venv/bin/python"
          export REDIS_FORCE_INMEMORY=1
          export CHROME_EXTENSION_ORIGIN=chrome-extension://dev

          PYTHONPATH="${BASE_WORKTREE}/hub-api" "${PYTHON_BIN}" "${BASE_WORKTREE}/hub-api/evals/runner.py" \
            --dataset "${BASE_WORKTREE}/hub-api/evals/gold_set.full.json" \
            --smoke "${BASE_WORKTREE}/hub-api/evals/gold_set.smoke_ids.json" \
            --report-dir "${BASE_WORKTREE}/hub-api/reports/judge/ci_baseline" \
            --mode smoke \
            --max-cases 5 \
            --judge \
            --judge-mode mock \
            --judge-model gpt-4.1-nano \
            --judge-sample-count 1 \
            --judge-candidate-id baseline \
            --judge-skip-calibration

          BASE_REPORT="${BASE_WORKTREE}/hub-api/reports/judge/ci_baseline/latest.json"
          CANDIDATE_REPORT="$(pwd)/reports/judge/ci_candidate/latest.json"
          PAIRWISE_DIR="$(pwd)/reports/judge/ci_pairwise"

          ./scripts/eval:judge:pairwise \
            --a-report "${BASE_REPORT}" \
            --b-report "${CANDIDATE_REPORT}" \
            --report-dir "${PAIRWISE_DIR}" \
            --label-a baseline \
            --label-b candidate

          ./scripts/eval:judge:regression-gate \
            --baseline-report "${BASE_REPORT}" \
            --candidate-report "${CANDIDATE_REPORT}" \
            --pairwise-report "${PAIRWISE_DIR}/pairwise_latest.json"

      - name: Upload judge CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: judge-ci-reports
          retention-days: 30
          if-no-files-found: warn
          path: |
            hub-api/reports/latest.json
            hub-api/reports/latest.md
            hub-api/reports/judge/ci_candidate/**
            hub-api/reports/judge/ci_pairwise/**
            hub-api/reports/judge/sanity/latest.json

  real-mode-nightly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend deps
        working-directory: hub-api
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Install extension deps
        working-directory: chrome-extension
        run: npm install

      - name: Fetch previous nightly metadata artifact
        working-directory: hub-api
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p reports/judge
          PREV_RUN_ID="$(gh run list --workflow ci.yml --limit 40 --json databaseId,event,conclusion --jq ".[] | select((.databaseId|tostring)!=\"$CURRENT_RUN_ID\" and (.event==\"schedule\" or .event==\"workflow_dispatch\") and .conclusion==\"success\") | .databaseId" | head -n 1 || true)"
          if [ -z "${PREV_RUN_ID}" ]; then
            echo "No previous successful nightly run found; drift guard will run without baseline."
            exit 0
          fi
          mkdir -p /tmp/judge-nightly-prev
          if gh run download "${PREV_RUN_ID}" -n judge-nightly-metadata -D /tmp/judge-nightly-prev; then
            if [ -f /tmp/judge-nightly-prev/nightly_metadata.json ]; then
              cp /tmp/judge-nightly-prev/nightly_metadata.json reports/judge/previous_nightly_metadata.json
              echo "Previous nightly metadata restored from run ${PREV_RUN_ID}."
            fi
          else
            echo "Previous metadata artifact not available; continuing without baseline."
          fi

      - name: Run checks with credentialed real smoke
        working-directory: hub-api
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMAILDJ_REAL_PROVIDER: openai
        run: |
          source .venv/bin/activate
          EMAILDJ_RUN_REAL_MODE_SMOKE=1 ./scripts/checks.sh

      - name: Run adversarial suite in real mode
        working-directory: hub-api
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMAILDJ_REAL_PROVIDER: openai
        run: |
          source .venv/bin/activate
          ./scripts/eval:adversarial --real

      - name: Run full judge eval (real mode)
        working-directory: hub-api
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMAILDJ_JUDGE_MODE: real
          EMAILDJ_JUDGE_MODEL: gpt-4.1-mini
          EMAILDJ_JUDGE_MODEL_VERSION: gpt-4.1-mini
        run: |
          source .venv/bin/activate
          ./scripts/eval:judge:full --judge-mode real --judge-model gpt-4.1-mini --judge-model-version gpt-4.1-mini

      - name: Calibrate judge thresholds (real mode)
        working-directory: hub-api
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMAILDJ_JUDGE_MODE: real
          EMAILDJ_JUDGE_MODEL: gpt-4.1-mini
          EMAILDJ_JUDGE_MODEL_VERSION: gpt-4.1-mini
        run: |
          source .venv/bin/activate
          ./scripts/eval:judge:calibrate --judge-mode real --judge-model gpt-4.1-mini --judge-model-version gpt-4.1-mini --judge-sample-count 3

      - name: Build judge trend report
        working-directory: hub-api
        run: |
          source .venv/bin/activate
          ./scripts/eval:judge:trend --mode full

      - name: Run real corpus judge eval
        working-directory: hub-api
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMAILDJ_JUDGE_MODE: real
          EMAILDJ_JUDGE_MODEL: gpt-4.1-mini
          EMAILDJ_JUDGE_MODEL_VERSION: gpt-4.1-mini
        run: |
          source .venv/bin/activate
          ./scripts/eval:judge:real-corpus --judge-mode real --judge-model gpt-4.1-mini --judge-model-version gpt-4.1-mini

      - name: Enforce judge drift guard
        working-directory: hub-api
        env:
          ALLOW_JUDGE_DRIFT_OVERRIDE: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.allow_judge_drift_override) || 'false' }}
        run: |
          set -euo pipefail
          source .venv/bin/activate
          EXTRA_ARGS=""
          if [ "${ALLOW_JUDGE_DRIFT_OVERRIDE}" = "true" ]; then
            EXTRA_ARGS="--allow-drift-override"
          fi
          ./scripts/eval:judge:drift-guard \
            --current-calibration reports/judge/calibration/latest.json \
            --previous-metadata reports/judge/previous_nightly_metadata.json \
            --out reports/judge/drift_guard/latest.json \
            --out-metadata reports/judge/nightly_metadata.json \
            ${EXTRA_ARGS}

      - name: Upload nightly judge reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: judge-nightly-reports
          retention-days: 30
          if-no-files-found: warn
          path: |
            hub-api/reports/latest.json
            hub-api/reports/latest.md
            hub-api/reports/judge/trend/latest.json
            hub-api/reports/judge/trend/latest.md
            hub-api/reports/judge/calibration/latest.json
            hub-api/reports/judge/calibration/threshold_changelog.jsonl
            hub-api/reports/judge/sanity/latest.json
            hub-api/reports/judge/real_corpus/latest.json
            hub-api/reports/judge/real_corpus/latest.md
            hub-api/reports/judge/drift_guard/latest.json

      - name: Upload nightly metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: judge-nightly-metadata
          retention-days: 30
          if-no-files-found: warn
          path: hub-api/reports/judge/nightly_metadata.json
