<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EmailDJ</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #f8f9fa;
      width: 100%;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: #1B3A6B;
      color: white;
      border-bottom: 2px solid #F5A623;
    }

    .header .logo {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header .logo span {
      color: #F5A623;
    }

    /* ── Tabs ────────────────────────────────────────────── */
    .tabs {
      display: flex;
      background: white;
      border-bottom: 1px solid #e0e0e0;
    }

    .tab-btn {
      flex: 1;
      padding: 10px 0;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: #666;
      transition: color 0.15s, border-bottom 0.15s;
      border-bottom: 2px solid transparent;
    }

    .tab-btn.active {
      color: #1B3A6B;
      border-bottom: 2px solid #F5A623;
    }

    .tab-btn:hover:not(.active) {
      color: #333;
      background: #f5f5f5;
    }

    /* ── Tab Panels ─────────────────────────────────────── */
    .tab-panel {
      padding: 12px 16px;
    }

    /* ── Generate button ────────────────────────────────── */
    .generate-btn {
      width: 100%;
      padding: 10px;
      background: #F5A623;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 12px;
    }

    .generate-btn:hover {
      background: #e09310;
    }

    .generate-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    /* ── Email Body ─────────────────────────────────────── */
    .email-body {
      min-height: 180px;
      padding: 10px;
      border: 1px solid #d0d5dd;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.5;
      background: white;
      outline: none;
      white-space: pre-wrap;
    }

    .email-body:focus {
      border-color: #1B3A6B;
      box-shadow: 0 0 0 2px #EEF4FF;
    }

    /* ── Action buttons ─────────────────────────────────── */
    .email-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .email-actions button {
      flex: 1;
      padding: 7px;
      border: 1px solid #d0d5dd;
      border-radius: 5px;
      background: white;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.1s;
    }

    .email-actions button:hover:not(:disabled) {
      background: #EEF4FF;
    }

    .email-actions button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── Slider ─────────────────────────────────────────── */
    .personalization-slider {
      margin: 10px 0;
    }

    .slider-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #666;
      margin-bottom: 4px;
    }

    .slider-input {
      width: 100%;
      accent-color: #1B3A6B;
    }

    .slider-tooltip {
      text-align: center;
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    /* ── Assignment items ───────────────────────────────── */
    .assignment-item {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }

    .assignment-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .campaign-name {
      font-weight: 600;
      font-size: 13px;
    }

    .vp-name {
      font-size: 11px;
      color: #888;
    }

    .rationale {
      font-size: 12px;
      color: #555;
      margin: 4px 0;
      line-height: 1.4;
    }

    .review-btn {
      margin-top: 6px;
      padding: 5px 12px;
      background: #1B3A6B;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    /* ── Context summary ────────────────────────────────── */
    .account-name {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .freshness-badge {
      font-size: 11px;
      margin-top: 4px;
    }

    /* ── Empty state ────────────────────────────────────── */
    .empty-state {
      color: #888;
      font-size: 12px;
      text-align: center;
      padding: 24px 0;
    }

    /* ── Loading skeleton ───────────────────────────────── */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .skeleton {
      background: #e0e0e0;
      border-radius: 4px;
      animation: pulse 1.5s ease-in-out infinite;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="logo">Email<span>DJ</span></div>
    <div id="assignmentBadge" style="display:none; margin-left:auto;
         background:#F5A623; color:white; font-size:11px; font-weight:700;
         padding:2px 7px; border-radius:10px;"></div>
  </header>

  <!-- Tab Navigation -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="generatePanel">Generate</button>
    <button class="tab-btn" data-tab="campaignsPanel">Campaigns</button>
  </div>

  <!-- Generate Panel -->
  <div id="generatePanel" class="tab-panel">
    <div id="quickGenerateContainer"></div>
  </div>

  <!-- Campaigns Panel -->
  <div id="campaignsPanel" class="tab-panel" style="display:none;">
    <div id="assignedCampaignsContainer"></div>
  </div>

  <script type="module" src="./index.js"></script>
</body>
</html>
